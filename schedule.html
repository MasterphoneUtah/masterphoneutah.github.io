<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: black;
  color: white;
  font-family: sans-serif;
}
</style>
</head>

<body>

<!-- TITLE -->
<div class="text-center py-10">
  <h1 
data-en="Book Your Repair" 
data-es="Reserva tu reparación">
Book Your Repair
</h1>

<p 
data-en="Choose a time that works for you" 
data-es="Elige un horario que te funcione">
Choose a time that works for you
</p>
</div>

<!-- ✅ CALENDLY (CORRECT PLACE) -->
<div class="max-w-4xl mx-auto px-4">
  <div class="calendly-inline-widget"
    data-url="https://calendly.com/masterphoneutah"
    style="min-width:320px;height:700px;">
  </div>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<!-- PHONE NUMBER -->
<div class="mt-10 text-center text-lg">
  <p class="text-gray-400"
data-en="Prefer to call or text?"
data-es="¿Prefieres llamar o enviar mensaje?">
Prefer to call or text?
</p>
  <p class="text-cyan-400 text-2xl font-bold mt-2">
    (786) 516-8016
  </p>
</div>

<!-- Floating Message Button -->

<div class="fixed bottom-6 right-6 z-50">

<div class="relative">

<button onclick="toggleMenu()"
class="bg-cyan-500 px-6 py-4 rounded-full shadow-xl text-white font-bold hover:scale-105 transition"
data-en="Message"
data-es="Mensaje">

Message

</button>

<div id="messageMenu" class="hidden absolute bottom-16 right-0 flex-col gap-3">

<a href="sms:17865168016"
class="block bg-blue-500 text-white px-5 py-3 rounded-xl shadow-lg"
data-en="SMS"
data-es="SMS">

SMS

</a>

<a href="https://wa.me/17865168016"
class="block bg-green-500 text-white px-5 py-3 rounded-xl shadow-lg"
data-en="WhatsApp"
data-es="WhatsApp">

WhatsApp

</a>

</div>

</div>

</div>
  <script>
let currentLang = "en";

/* LOAD LANGUAGE */
window.onload = function () {
  const params = new URLSearchParams(window.location.search);
  const urlLang = params.get("lang");
  const savedLang = localStorage.getItem("lang");

  const langToUse = urlLang || savedLang || "en";
  switchLanguage(langToUse);
};

/* SWITCH LANGUAGE */
function switchLanguage(lang) {
  currentLang = lang;

  localStorage.setItem("lang", lang);

  document.querySelectorAll("[data-en]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });
}

/* KEEP YOUR MENU */
function toggleMenu(){
  const menu = document.getElementById("messageMenu");
  if(menu) menu.classList.toggle("hidden");
}
</script>

</body>
</html>
