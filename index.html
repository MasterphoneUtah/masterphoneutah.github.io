<style>

/* UTAH */

}

.line {

/* LANGUAGE BUTTON */
.lang-btn {
  border: 1px solid #3a4a5f;
  padding: 6px 12px;
  border-radius: 8px;
  transition: 0.3s;
  color: white;
}

.lang-btn:hover {
  border-color: #5fb8ff;
  color: #5fb8ff;
  box-shadow: 0 0 10px rgba(95,184,255,.6);
}

.lang-btn:active {
  transform: scale(0.95);
  box-shadow: 0 0 15px rgba(95,184,255,0.9);
}

.lang-btn.active {
  border-color: #5fb8ff;
  color: #5fb8ff;
  box-shadow: 0 0 12px rgba(95,184,255,.8);
}
</style>
</head>

<!-- FLOATING BUTTON -->
<div class="fixed bottom-6 right-6 z-50">
<button onclick="toggleMenu()" class="bg-cyan-500 px-6 py-4 rounded-full text-white font-bold">
Message
</button>
</div>

<script>
function toggleMenu(){
  const menu = document.getElementById("messageMenu");
  if(menu) menu.classList.toggle("hidden");
}

/* ✅ LANGUAGE SYSTEM */
let currentLang = "en";

function switchLanguage(lang) {
  currentLang = lang;

  document.querySelectorAll("[data-en]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });

  const btn = document.getElementById("langToggle");

  btn.textContent = lang === "en" ? "Español" : "English";

  btn.classList.add("active");
  setTimeout(() => btn.classList.remove("active"), 200);
}

function toggleLanguage() {
  const newLang = currentLang === "en" ? "es" : "en";
  switchLanguage(newLang);
}
</script>
