<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MasterPhone UTAH</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  font-family: 'Inter', sans-serif;
  color: white;
}

/* BRAND */
.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 36px;
  font-weight: 700;
}

.master {
  background: linear-gradient(90deg, #ff4fd8, #ff2fa6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.phone {
  background: linear-gradient(90deg, #5fb8ff, #9be7ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* UTAH */
.utah-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.line {
  width: 40px;
  height: 2px;
  background: #5fb8ff;
}

.utah {
  font-size: 12px;
  letter-spacing: .5em;
  color: #d8eaff;
}

/* LANGUAGE BUTTON */
.lang-btn {
  border: 1px solid #3a4a5f;
  padding: 6px 12px;
  border-radius: 8px;
  transition: 0.3s;
  color: white;
}

.lang-btn:hover {
  border-color: #5fb8ff;
  color: #5fb8ff;
}

.lang-btn.active {
  border-color: #5fb8ff;
  color: #5fb8ff;
}
</style>
</head>

<body class="text-white">

<!-- HEADER -->
<header class="bg-black border-b border-gray-800">
<div class="max-w-7xl mx-auto flex justify-between items-center p-6">

<div class="flex items-center gap-4">
<img src="LOGO2.png" class="h-20">

<div>
<div class="brand">
<span class="master">Master</span><span class="phone">Phone</span>
</div>

<div class="utah-row">
<div class="line"></div>
<div class="utah">UTAH</div>
<div class="line"></div>
</div>
</div>
</div>

<!-- LANGUAGE BUTTON -->
<button id="langToggle" onclick="toggleLanguage()" class="lang-btn">
Español
</button>

</div>
</header>

<!-- HERO -->
<section class="text-center py-24">

<h2 class="text-5xl font-bold mb-6"
data-en="Elite Device Repair"
data-es="Reparación Profesional de Dispositivos">
Elite Device Repair
</h2>

<p class="text-gray-400 mb-10"
data-en="Phones • Laptops • PCs • Tablets • Consoles"
data-es="Teléfonos • Portátiles • PCs • Tabletas • Consolas">
Phones • Laptops • PCs • Tablets • Consoles
</p>

<a href="schedule.html"
class="bg-cyan-500 px-8 py-4 rounded-xl font-bold"
data-en="Book Appointment"
data-es="Reservar Cita">
Book Appointment
</a>

</section>

<!-- TRUST -->
<section class="py-14 text-center">

<p data-en="Devices Repaired" data-es="Dispositivos Reparados">Devices Repaired</p>

<p data-en="Same Day Repairs" data-es="Reparaciones el mismo día">Same Day Repairs</p>

<p data-en="Free Diagnostics" data-es="Diagnóstico Gratis">Free Diagnostics</p>

</section>

<!-- CONTACT -->
<section class="text-center py-20">

<h3 data-en="Visit Us" data-es="Visítanos">Visit Us</h3>

<p>5772 W 8030 S, West Jordan, UT</p>

</section>

<!-- SCRIPT -->
<script>
let currentLang = "en";

function switchLanguage(lang) {
  currentLang = lang;

  document.querySelectorAll("[data-en]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });

  const btn = document.getElementById("langToggle");

  btn.textContent = lang === "en" ? "Español" : "English";

  btn.classList.add("active");
  setTimeout(() => btn.classList.remove("active"), 200);
}

function toggleLanguage() {
  const newLang = currentLang === "en" ? "es" : "en";
  switchLanguage(newLang);
}
</script>

</body>
</html>
